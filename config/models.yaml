# Per-stage LLM routing. This is the ONLY file where model names may appear.
# Router behavior: primary -> (over budget or failed max_retries) -> fallback
# chain -> LLMError. Usage recorded to .runtime/llm_usage.json; budgets reset
# daily, so an exhausted provider comes back automatically the next day.
#
# Providers below match the current PersonalKM stack
# (bot/llm_clients.py: MiniMax primary, OpenAI fallback; Ollama on Mac Mini).

providers:
  minimax:
    kind: openai_compat
    base_url: https://api.minimax.io/v1
    api_key_env: MINIMAX_API_KEY
  openai:
    kind: openai_compat            # base_url omitted => api.openai.com
    api_key_env: OPENAI_API_KEY
  ollama:
    kind: ollama
    base_url: http://localhost:11434
  claude:
    kind: anthropic                # enable by setting ANTHROPIC_API_KEY
    api_key_env: ANTHROPIC_API_KEY
  deepseek:
    kind: openai_compat
    base_url: https://api.deepseek.com
    api_key_env: DEEPSEEK_API_KEY

# Daily token budgets (input+output). TODO: adjust to your real plan quotas.
budgets:
  minimax:  { daily_tokens: 500000 }
  openai:   { daily_tokens: 200000 }
  claude:   { daily_tokens: 300000 }
  deepseek: { daily_tokens: 1000000 }  # safety cap only — pricing is cheap enough this shouldn't bind
  ollama:   { daily_tokens: unlimited }

defaults:
  max_retries: 2
  timeout_s: 300

stages:
  # Phase A: full wiki note synthesis (quality-critical). Cloud-first since
  # 2026-07-20: side-by-side comparison on real captures via
  # scripts/compare_ingest_synthesis.py (ingest_synthesis vs the now-retired
  # ingest_synthesis_trial stage) showed DeepSeek consistently kept more
  # concrete detail than ollama/qwen3:8b (specific tool/model names, rollout
  # specifics, named frameworks) at comparable or better speed, on every
  # sample tried. Every capture goes through this stage, so quality here
  # matters more than the negligible cost difference at this volume.
  ingest_synthesis:
    primary:  deepseek/deepseek-v4-flash
    fallback: [minimax/MiniMax-M2.7-highspeed, ollama/qwen3:8b]
    # deepseek-v4-flash's internal reasoning pass counts against
    # max_output_tokens (see entity_distillation below) — sized the same way.
    max_output_tokens: 4000

  # Cheap structured extraction: entities, tags, classification
  entity_extraction:
    primary:  ollama/qwen2.5:latest
    fallback: [minimax/MiniMax-M2.7-highspeed]
    max_output_tokens: 800
    json_only: true

  # Phase B / Phase 6: wikilink + entity page updates
  propagation_distill:
    primary:  ollama/qwen2.5:latest
    fallback: [minimax/MiniMax-M2.7-highspeed]
    max_output_tokens: 1200

  # Query engine answers (LINE 我問)
  query_answer:
    primary:  minimax/MiniMax-M2.7-highspeed
    fallback: [ollama/qwen2.5:latest]
    max_output_tokens: 1500

  # Pre-ingestion raw note quality check (cheap — classification only)
  raw_quality_check:
    primary:  ollama/qwen2.5:latest
    fallback: [minimax/MiniMax-M2.7-highspeed]
    max_output_tokens: 600
    json_only: true

  # Entity Distillation Loop (SPEC.md, IMPROVEMENT-BACKLOG.md P5) — dry-run
  # only for now. Cloud-first per 2026-07-19 decision: this is a low-volume,
  # high-stakes (lossy, hard to notice if wrong) task, unlike entity_extraction
  # above — quality matters more than the cents/month cost difference.
  entity_distillation:
    primary:  deepseek/deepseek-v4-flash
    fallback: [minimax/MiniMax-M2.7-highspeed, ollama/qwen3:8b]
    # deepseek-v4-flash emits an internal reasoning_content pass before the
    # actual JSON reply, and both count against max_output_tokens — 1500 was
    # too tight and the reasoning ate the whole budget, returning an empty
    # or truncated response (2026-07-19 real-vault dry-run). Raised to give
    # headroom for reasoning + a full Traditional-Chinese JSON summary.
    max_output_tokens: 4000
    json_only: true
